<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #111;
        }

        canvas {
            display: block;
        }

        #help-overlay {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #cccccc;
            font-family: monospace;
            font-size: 12px;
            padding: 12px 16px;
            border-radius: 6px;
            pointer-events: none;
            line-height: 1.8;
            min-width: 220px;
        }

        .help-title {
            color: #ffffff;
            font-size: 13px;
        }

        #help-content {
            display: none;
            margin-top: 6px;
            border-top: 1px solid #444;
            padding-top: 6px;
        }

        .help-title {
            color: #ffffff;
            font-size: 13px;
            margin-bottom: 6px;
            border-bottom: 1px solid #444;
            padding-bottom: 4px;
        }

        .help-group {
            color: #888888;
            font-size: 11px;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .help-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .help-key {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            padding: 1px 6px;
            border-radius: 3px;
            min-width: 24px;
            text-align: center;
        }
    </style>
</head>

<body>
    <script type="module" src="/src/main.js"></script>

    <div id="help-overlay">
        <div class="help-title">Help (H to toggle)</div>
        <div id="help-content">
            <div class="help-group">Camera</div>
            <div class="help-row"><span class="help-key">1-6</span> Camera distance presets</div>
            <div class="help-row"><span class="help-key">O</span> Toggle orbit controls</div>

            <div class="help-group">Debug</div>
            <div class="help-row"><span class="help-key">D</span> Toggle debug panel</div>
            <div class="help-row"><span class="help-key">F</span> Toggle UI visibility</div>
            <div class="help-row"><span class="help-key">R</span> Save snapshot</div>
            <div class="help-row"><span class="help-key">C</span> Clear snapshots</div>
            <div class="help-row"><span class="help-key">Q</span> Freeze sphere</div>

            <div class="help-group">Sphere</div>
            <div class="help-row"><span class="help-key">K</span> Decrease brightness</div>
            <div class="help-row"><span class="help-key">L</span> Increase brightness</div>
        </div>
    </div>
</body>

</html>
